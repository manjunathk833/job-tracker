name: Job Alert Cron

on:
  schedule:
    # Daily at 8:30 PM IST = 3:00 PM UTC (IST is UTC+5:30)
    - cron: '0 15 * * *'
  workflow_dispatch:   # Manual trigger from GitHub Actions UI

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch job listings from all alert sources
        run: node scripts/job-alert-cron.js "${{ secrets.PB_ADMIN_EMAIL }}" "${{ secrets.PB_ADMIN_PASSWORD }}"
        env:
          # Points the cron at the live Fly.io PocketBase — NOT localhost
          VITE_PB_URL: ${{ secrets.VITE_PB_URL }}
          # Optional — Adzuna India listings (cron skips Adzuna source if not set)
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
