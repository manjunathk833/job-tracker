name: CI
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: 'npm' }
      - run: npm ci
      # CI build uses localhost fallback — validates the build succeeds
      # Production build runs on Netlify with VITE_PB_URL set to the PocketHost URL
      - run: npm run build
        env:
          VITE_PB_URL: http://localhost:8090
